<svg width="800" height="200" viewBox="-1 -1 802 202" xmlns="http://www.w3.org/2000/svg">
    <style>
        .title {
        font: bold 24px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue",
        Arial, sans-serif;
        }
        .body {
        font: 20px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial,
        sans-serif;
        color: #333;
        }
        a {
        fill: black;
        text-decoration: none;
        }
    </style>

    <defs>
        <linearGradient id="lightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="100%" stop-color="#f5f7fa" />
        </linearGradient>
    </defs>

    <rect x="1" y="1" width="798" height="198" rx="16" ry="16" fill="url(#lightGradient)"
        stroke="gray" stroke-width="0.3" />

    <text x="400" y="60" text-anchor="middle" class="title">💨 blazing.cpp</text>

    <text x="400" y="110" text-anchor="middle" class="body" fill="#666"> 이 포스트는 C++ 개발자들의 스터디 그룹 <tspan
            font-style="italic">blazing.cpp</tspan> 프로젝트의 일환입니다. </text>

    <a href="https://github.com/blazing-cpp" target="_blank">
        <text x="400" y="150" text-anchor="middle" class="body" fill="#666">
            여기를 클릭하여 blazing.cpp 의 다른 포스트도 살펴보세요.
        </text>
    </a>
</svg>